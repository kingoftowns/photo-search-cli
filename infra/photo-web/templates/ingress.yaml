apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "photo-web.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photo-web.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.externalDnsTarget }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.ingress.externalDnsTarget }}
    {{- end }}
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Allow large originals (HEIC/RAW) through the ingress.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    {{- if .Values.ingress.basicAuth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.ingress.basicAuth.secretName | quote }}
    nginx.ingress.kubernetes.io/auth-realm: "photo-search"
    {{- end }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "photo-web.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "photo-web.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
