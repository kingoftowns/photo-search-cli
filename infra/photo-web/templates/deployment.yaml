apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "photo-web.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photo-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "photo-web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "photo-web.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # Consumed by nginx envsubst template to proxy /api, /thumbs,
            # and /originals to the photo-api Service.
            - name: API_UPSTREAM
              value: {{ .Values.apiUpstream | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
