apiVersion: v1
kind: Secret
metadata:
  name: {{ include "photo-api.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photo-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Consumed as PHOTO_SEARCH_POSTGRES__CONNECTION_STRING inside the pod.
  postgresConnectionString: {{ .Values.postgres.connectionString | quote }}
