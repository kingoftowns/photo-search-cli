apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "photosearch-qdrant.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photosearch-qdrant.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.externalDnsTarget }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.ingress.externalDnsTarget }}
    {{- end }}
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "photosearch-qdrant.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qdrant
                port:
                  number: {{ .Values.service.httpPort }}
