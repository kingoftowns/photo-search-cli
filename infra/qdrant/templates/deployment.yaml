apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "photosearch-qdrant.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photosearch-qdrant.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "photosearch-qdrant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "photosearch-qdrant.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 6333
              protocol: TCP
            - name: grpc
              containerPort: 6334
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "photosearch-qdrant.fullname" . }}-pvc
