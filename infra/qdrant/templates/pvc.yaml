apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "photosearch-qdrant.fullname" . }}-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photosearch-qdrant.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.persistence.storageClass }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  volumeName: {{ include "photosearch-qdrant.fullname" . }}-pv
