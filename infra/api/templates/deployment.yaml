apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "photosearch-api.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photosearch-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "photosearch-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "photosearch-api.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart whenever rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn"]
          args:
            - "api:app"
            - "--host=0.0.0.0"
            - "--port=8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PHOTO_SEARCH_CORS_ORIGINS
              value: {{ .Values.cors.origins | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.passwordSecretName }}
                  key: {{ .Values.postgres.passwordSecretKey }}
            # Postgres DSN assembled from plain values + secret password.
            # K8s env var expansion (`$(VAR)`) substitutes POSTGRES_PASSWORD
            # because it is declared earlier in this list.
            - name: PHOTO_SEARCH_POSTGRES__CONNECTION_STRING
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
            {{- if eq .Values.captioner.provider "anthropic" }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.captioner.anthropic.apiKeySecretName }}
                  key: {{ .Values.captioner.anthropic.apiKeySecretKey }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: photos
              mountPath: {{ .Values.photos.mountPath }}
              readOnly: true
            # Persistent thumbnail cache. Matches PHOTO_SEARCH_THUMB_CACHE
            # set in the image's Dockerfile (/var/cache/photo-thumbs).
            # Without this the cache lives in the container's writable
            # layer and is wiped on every pod restart, forcing bursty HEIC
            # decodes that OOMKilled the pod on cold starts.
            - name: thumbs
              mountPath: /var/cache/photo-thumbs
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "photosearch-api.fullname" . }}
            items:
              - key: config.yaml
                path: config.yaml
        - name: photos
          persistentVolumeClaim:
            claimName: {{ include "photosearch-api.fullname" . }}-photos-pvc
        - name: thumbs
          persistentVolumeClaim:
            claimName: {{ include "photosearch-api.fullname" . }}-thumbs-pvc
