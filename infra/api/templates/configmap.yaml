apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "photosearch-api.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photosearch-api.labels" . | nindent 4 }}
data:
  config.yaml: |
    photos:
      source_dir: {{ .Values.photos.mountPath | quote }}
      source_dir_aliases:
        {{- range (.Values.photos.sourceDirAliases | default list) }}
        - {{ . | quote }}
        {{- end }}
      supported_extensions:
        {{- range .Values.photos.supportedExtensions }}
        - {{ . | quote }}
        {{- end }}
      skip_extensions:
        {{- range .Values.photos.skipExtensions }}
        - {{ . | quote }}
        {{- end }}

    ollama:
      base_url: {{ .Values.ollama.baseUrl | quote }}
      vision_model: {{ .Values.ollama.visionModel | quote }}
      embedding_model: {{ .Values.ollama.embeddingModel | quote }}
      request_timeout: {{ .Values.ollama.requestTimeout }}

    captioner:
      provider: {{ .Values.captioner.provider | quote }}
      anthropic:
        model: {{ .Values.captioner.anthropic.model | quote }}
        max_tokens: {{ .Values.captioner.anthropic.maxTokens }}

    faces:
      model_pack: {{ .Values.faces.modelPack | quote }}
      similarity_threshold: {{ .Values.faces.similarityThreshold }}
      min_face_size: {{ .Values.faces.minFaceSize }}

    qdrant:
      url: {{ .Values.qdrant.url | quote }}
      collection_name: {{ .Values.qdrant.collectionName | quote }}
      vector_size: {{ .Values.qdrant.vectorSize }}

    geocoding:
      enabled: {{ .Values.geocoding.enabled }}

    pipeline:
      batch_log_interval: {{ .Values.pipeline.batchLogInterval }}
      max_retries: {{ .Values.pipeline.maxRetries }}
      retry_delay: {{ .Values.pipeline.retryDelay }}
      resize_max_dimension: {{ .Values.pipeline.resizeMaxDimension }}
      concurrency: {{ .Values.pipeline.concurrency }}
