apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "photosearch-ollama.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "photosearch-ollama.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "photosearch-ollama.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "photosearch-ollama.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: "/root/.ollama/models"
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          # Pull configured models after the server is up. We tolerate
          # transient failures so the pod still becomes Ready; a later
          # manual `ollama pull` or restart will finish the job.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -e
                    # Wait for API.
                    for i in $(seq 1 60); do
                      if wget -qO- http://127.0.0.1:11434/ >/dev/null 2>&1; then
                        break
                      fi
                      sleep 1
                    done
                    {{- range .Values.models.pull }}
                    ollama pull {{ . | quote }} || true
                    {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "photosearch-ollama.fullname" . }}-pvc
