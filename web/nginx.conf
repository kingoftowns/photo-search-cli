# photo-web nginx config. Processed by envsubst at container start —
# `${API_UPSTREAM}` comes from the container env (default http://photo-api:8000).

server {
    listen 80;
    server_name _;

    # Bump body size + buffering so larger HEIC transcodes stream cleanly.
    client_max_body_size 64M;
    proxy_buffering off;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets produced by Vite build.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + binary routes → photo-api service.
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /thumbs/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        expires 1d;
    }
    location /originals/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
    }

    # SPA fallback — any non-file path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
