# photo-web nginx config. In two-ingress mode the browser talks to the
# API host directly (CORS), so this server only serves the static SPA
# bundle.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long cache for hashed assets produced by Vite build.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any non-file path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
